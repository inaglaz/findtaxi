<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#243D5D">
<title>Comisiones FindTaxi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Poppins:wght@400;500;700&display=swap">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  :root{
    --bs-primary: #243D5D;
    --bs-primary-rgb: 36,61,93;
    --color-terciary: #14b8a6;
    --bg-soft: #f5f7fb;
    --color-amber: #f59e0b;
    --color-amber-soft: #fef3c7;
    --color-gray-soft: #f1f5f9;
    --color-green-soft: #d1fae5;
  }
  .text-primary{color: var(--bs-primary)!important;}
  .bg-primary{background-color: var(--bs-primary)!important;}
  .btn-primary{
    --bs-btn-bg: #243D5D; --bs-btn-border-color: #243D5D;
    --bs-btn-hover-bg: #1b2f49; --bs-btn-hover-border-color: #1b2f49;
    --bs-btn-active-bg: #15263a; --bs-btn-active-border-color: #15263a;
  }
  .btn-outline-primary{
    --bs-btn-color: #243D5D; --bs-btn-border-color: #243D5D;
    --bs-btn-hover-bg: #243D5D; --bs-btn-hover-border-color: #243D5D;
  }
  html,body{height:100%;}
  body{
    font-family:'DM Sans', system-ui, sans-serif;
    background: var(--bg-soft);
    color:#1f2937;
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2,h3,h4,h5,h6,.brand-text{
    font-family:'Poppins', sans-serif;
    font-weight:700;
  }

  .bg-terciary{background-color: var(--color-terciary)!important; color:#fff!important;}
  .text-terciary{color: var(--color-terciary)!important;}

  /* MONTH SUMMARY HERO */
  .summary-card{
    position:relative;overflow:hidden;
    border:0; border-radius:20px;
    background:
      radial-gradient(120% 140% at 100% 0%, rgba(20,184,166,.35) 0%, rgba(20,184,166,0) 55%),
      radial-gradient(80% 120% at 0% 100%, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 60%),
      linear-gradient(135deg, #1a2e47 0%, #243D5D 45%, #34547d 100%);
    color:#fff;
    box-shadow:0 14px 36px rgba(36,61,93,.32);
    cursor:pointer;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .summary-card::before{
    content:""; position:absolute; right:-40px; top:-40px;
    width:160px; height:160px; border-radius:50%;
    background: radial-gradient(circle, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 70%);
    pointer-events:none;
  }
  .summary-card:hover{transform: translateY(-1px); box-shadow:0 16px 40px rgba(36,61,93,.36);}
  .summary-card .hero-row{
    display:flex;align-items:center;gap:.7rem;flex-wrap:nowrap;
  }
  .summary-card .hero-icon{
    width:38px;height:38px;border-radius:12px;flex:0 0 38px;
    background: rgba(255,255,255,.14);
    display:inline-flex;align-items:center;justify-content:center;
    backdrop-filter: blur(6px);
    font-size:1.1rem;
  }
  .summary-card .hero-text{
    font-family:'Poppins',sans-serif;font-weight:700;
    font-size:1.15rem;letter-spacing:-.01em;line-height:1.1;
    flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .summary-card .hero-text .hero-month{opacity:.8;font-weight:500;text-transform:uppercase;letter-spacing:.06em;font-size:.78rem;display:block;margin-bottom:.1rem;}
  .summary-card .hero-text .hero-amount{color:#fff;}
  .summary-card .hero-text .hero-amount .accent{color:#5eead4;}
  .summary-card .chev{
    width:32px;height:32px;border-radius:50%;
    background:rgba(255,255,255,.12);
    display:inline-flex;align-items:center;justify-content:center;
    transition:transform .2s ease;flex:0 0 32px;
  }
  .summary-card[aria-expanded="true"] .chev{transform:rotate(180deg);}
  @media (max-width: 380px){
    .summary-card .hero-text{font-size:1.02rem;}
    .summary-card .hero-icon{width:34px;height:34px;flex-basis:34px;}
  }

  .day-nav{
    background:#fff; border-radius:16px;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
  }
  .day-nav .day-title{font-weight:700;text-transform:capitalize;}
  .btn-day{
    width:42px;height:42px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    border:1px solid #e5e7eb;background:#fff;color:#243D5D;
  }
  .btn-day:hover{background:#eaeef5;}

  /* TEXTAREA NOTES */
  .notes-card{
    background:#fff;border-radius:16px;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
    padding:.9rem;
  }
  .notes-card label{
    display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;
    color:#6b7280;font-weight:600;margin-bottom:.4rem;
  }
  .notes-textarea{
    width:100%;min-height:220px;
    border:1px solid #e5e7eb;border-radius:12px;
    padding:.75rem .9rem;
    font-family:'DM Sans', system-ui, sans-serif;
    font-size:1rem;line-height:1.5;
    resize:none;
    overflow:hidden;
    outline:none;
    background:#fbfbfd;
    color:#1f2937;
  }
  .notes-textarea:focus{border-color:#243D5D;background:#fff;box-shadow:0 0 0 3px rgba(36,61,93,.08);}

  /* PARSED PANEL */
  .parsed-card{
    background:#fff;border-radius:16px;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
    padding:.5rem .25rem;
  }
  .parsed-empty{
    text-align:center;color:#9ca3af;font-size:.9rem;padding:1.25rem .75rem;
  }
  .parsed-line{
    display:flex;align-items:flex-start;gap:.55rem;
    padding:.55rem .75rem;
    border-left:4px solid transparent;
    border-bottom:1px solid #f1f5f9;
    cursor:pointer;
    transition: filter .15s ease;
    -webkit-tap-highlight-color: rgba(36,61,93,.08);
  }
  .parsed-line:hover{filter:brightness(.97);}
  .parsed-line:active{filter:brightness(.94);}
  .parsed-line:last-child{border-bottom:0;}
  .parsed-line.line-comm{
    background:rgba(20,184,166,.08);
    border-left-color: var(--color-terciary);
  }
  .parsed-line.line-comm-paid{
    background:rgba(20,184,166,.28);
  }
  .parsed-line.line-known{
    background:#fff;
    border-left-color:#cbd5e1;
  }
  .parsed-line.line-unknown{
    background:#fff;
    border-left-color:#cbd5e1;
  }
  .parsed-line.line-owner{
    background:#fff7ed;
    border-left-color:#f97316;
  }
  .parsed-time{
    flex:0 0 52px;
    font-family:'Poppins', sans-serif;font-weight:700;
    color:#1f2937;font-size:.95rem;line-height:1.4;
  }
  .parsed-time.muted{color:#9ca3af;font-weight:500;}
  .parsed-body{flex:1 1 auto;min-width:0;}
  .parsed-hotel{
    font-weight:600;color:#1f2937;font-size:.98rem;
    display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;line-height:1.3;
  }
  .parsed-hotel .pill{
    font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:.12rem .45rem;border-radius:999px;
  }
  .pill-comm{background: var(--color-terciary);color:#fff;}
  .pill-nocomm{background:#e5e7eb;color:#475569;}
  .pill-unknown{background:#e5e7eb;color:#475569;}
  .pill-owner{background:#f97316;color:#fff;}
  .parsed-meta{
    color:#6b7280;font-size:.84rem;margin-top:.1rem;
  }
  .parsed-meta .room{font-weight:600;color:#374151;}
  .parsed-comment{
    color:#9ca3af;font-size:.8rem;font-style:italic;margin-top:.05rem;
  }
  .parsed-actions{
    display:flex;align-items:center;gap:.3rem;
    flex:0 0 auto;margin-left:.4rem;
  }
  .btn-pay{
    border:1px solid var(--color-terciary);background:#fff;
    color:#0f766e;font-size:.74rem;font-weight:700;
    padding:.22rem .55rem;border-radius:8px;cursor:pointer;
    text-transform:uppercase;letter-spacing:.04em;
    transition: background .15s ease;
  }
  .btn-pay:hover{background:rgba(20,184,166,.12);}
  .btn-pay:active{transform:scale(.96);}
  .btn-pay-done{
    font-size:.74rem;font-weight:700;color:#fff;
    background:var(--color-terciary);
    padding:.22rem .55rem;border-radius:8px;
    text-transform:uppercase;letter-spacing:.04em;
    cursor:default;user-select:none;
  }
  .btn-pay-undo{
    border:1px solid #fecaca;background:#fff;
    color:#dc2626;font-size:.95rem;line-height:1;font-weight:700;
    width:26px;height:26px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;padding:0;
  }
  .btn-pay-undo:hover{background:#fee2e2;}
  .parsed-summary{
    display:flex;align-items:center;justify-content:space-between;
    padding:.5rem .85rem;background:#f8fafc;border-radius:10px;
    font-size:.85rem;color:#475569;margin-bottom:.4rem;
  }
  .parsed-summary .count strong{color:#243D5D;}

  .breakdown{
    background:#fff;border-radius:16px;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
  }
  .breakdown .list-group-item{border:0;border-bottom:1px solid #f1f5f9;}
  .breakdown .list-group-item:last-child{border-bottom:0;}

  .footer-actions .btn{border-radius:12px;font-weight:600;}
  .btn-primary{font-weight:600;}
  .btn-icon{
    width:42px;height:42px;border-radius:50%;flex:0 0 42px;
    display:inline-flex;align-items:center;justify-content:center;
    border:1px solid #e5e7eb;background:#fff;color:#243D5D;
    transition: background .15s ease;
  }
  .btn-icon:hover{background:#eaeef5;}

  .day-total-pill{
    display:inline-flex;align-items:center;gap:.45rem;
    background:#fff;border:1px solid #e5e7eb;border-radius:999px;
    padding:.4rem .8rem;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
    flex:0 0 auto;
  }
  .day-total-pill .day-total-label{
    font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;font-weight:600;
  }
  .day-total-pill .day-total-amount{
    font-family:'Poppins',sans-serif;font-weight:700;color: var(--color-terciary);font-size:1.05rem;
  }
  @media (max-width: 380px){
    .day-total-pill{padding:.35rem .65rem;}
    .day-total-pill .day-total-label{font-size:.66rem;}
    .day-total-pill .day-total-amount{font-size:.95rem;}
    .parsed-time{flex-basis:46px;font-size:.88rem;}
    .parsed-hotel{font-size:.92rem;}
  }

  /* TEXTAREA LINE HIGHLIGHT (when user taps a parsed line) */
  .line-highlight{
    position:absolute;pointer-events:none;
    border-radius:4px;z-index:5;
    animation: lineFlash 1.8s ease-out forwards;
  }
  .line-highlight.lh-comm    { background: rgba(20,184,166,.42); }
  .line-highlight.lh-known   { background: rgba(148,163,184,.40); }
  .line-highlight.lh-unknown { background: rgba(148,163,184,.40); }
  .line-highlight.lh-owner   { background: rgba(249,115,22,.42); }
  @keyframes lineFlash{
    0%   { opacity:0; }
    10%  { opacity:1; }
    70%  { opacity:1; }
    100% { opacity:0; }
  }

  /* AUTOCOMPLETE POPUP */
  .ac-popup{
    position:absolute;z-index:80;
    background:#fff;border:1px solid #e5e7eb;border-radius:10px;
    box-shadow:0 10px 30px rgba(15,23,42,.15);
    min-width:180px;max-width:260px;overflow:hidden;
    font-family:'DM Sans', system-ui, sans-serif;font-size:.92rem;
  }
  .ac-popup .ac-item{
    padding:.5rem .75rem;cursor:pointer;display:flex;align-items:center;gap:.5rem;
    border-bottom:1px solid #f1f5f9;
  }
  .ac-popup .ac-item:last-child{border-bottom:0;}
  .ac-popup .ac-item.active, .ac-popup .ac-item:hover{
    background:rgba(20,184,166,.12);color:#0f766e;
  }
  .ac-popup .ac-tag{
    margin-left:auto;font-size:.65rem;font-weight:700;
    background: var(--color-terciary);color:#fff;
    padding:.1rem .4rem;border-radius:999px;
  }
  .ac-hint{
    margin-top:.35rem;font-size:.75rem;color:#9ca3af;
    display:none;
  }
  .ac-hint.is-visible{display:block;}

  .sync-status{
    display:inline-flex;align-items:center;gap:.4rem;
    padding:.25rem .6rem;border-radius:999px;
    background:#fff;border:1px solid #eef2f7;
    font-size:.78rem;
  }
  .sync-status.is-synced{color:#0f766e;}
  .sync-status.is-offline{color:#b45309;}
  .sync-status.is-syncing{color:#6b7280;}
  .sync-status.is-error{color:#b91c1c;}
</style>
</head>
<body>

<main class="container py-3" style="max-width:900px;">

  <!-- MONTH SUMMARY HERO -->
  <div class="summary-card px-3 py-3 mb-3" id="monthSummaryCard" role="button"
       data-bs-toggle="collapse" data-bs-target="#monthBreakdown" aria-expanded="false">
    <div class="hero-row">
      <span class="hero-icon"><i class="bi bi-coin"></i></span>
      <div class="hero-text">
        <span class="hero-month">Total mes</span>
        <span class="hero-amount"><span id="monthName">—</span> · <span class="accent"><span id="monthTotal">0</span>€</span></span>
      </div>
      <span class="chev"><i class="bi bi-chevron-down"></i></span>
    </div>
  </div>

  <div class="collapse mb-3" id="monthBreakdown">
    <div class="breakdown p-3 p-md-4">
      <h6 class="mb-3 text-muted text-uppercase" style="letter-spacing:.05em;">Desglose por hotel</h6>
      <ul class="list-group list-group-flush" id="breakdownList">
        <li class="list-group-item text-muted">Sin servicios comisionables todavía.</li>
      </ul>
      <div class="d-flex flex-wrap gap-2 mt-3">
        <button class="btn btn-outline-danger btn-sm" id="deleteMonthBtn">
          <i class="bi bi-trash3"></i> Eliminar este mes
        </button>
      </div>
    </div>
  </div>

  <!-- DAY NAVIGATION -->
  <div class="day-nav d-flex align-items-center justify-content-between p-2 p-md-3 mb-3">
    <button class="btn-day" id="prevDayBtn" aria-label="Día anterior">
      <i class="bi bi-chevron-left"></i>
    </button>
    <div class="text-center">
      <div class="text-muted small">Jornada</div>
      <div class="day-title" id="dayTitle">—</div>
      <div class="text-terciary small" id="dayCommission">0€ en comisiones</div>
    </div>
    <button class="btn-day" id="nextDayBtn" aria-label="Día siguiente">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>

  <!-- NOTES TEXTAREA -->
  <div class="notes-card mb-3">
    <label for="dayText">Servicios del día</label>
    <textarea id="dayText" class="notes-textarea" spellcheck="false" autocomplete="off"
      placeholder="Pega o escribe los servicios, una línea por servicio.&#10;Ej: 4'00 Letoh 401"></textarea>
    <div id="acHint" class="ac-hint">
      <i class="bi bi-lightbulb"></i> Sugerencia: <kbd>Tab</kbd> para autocompletar el hotel.
    </div>
  </div>

  <!-- PARSED PANEL -->
  <div class="parsed-card mb-3">
    <div class="parsed-summary" id="parsedSummary" style="display:none;"></div>
    <div id="parsedList"></div>
  </div>

  <div class="footer-actions d-flex align-items-center flex-nowrap gap-2 mb-4">
    <button class="btn-icon" id="todayBtn" aria-label="Ir a hoy" title="Ir a hoy">
      <i class="bi bi-calendar-day"></i>
    </button>
    <div class="ms-auto day-total-pill">
      <span class="day-total-label">Total día</span>
      <span class="day-total-amount"><span id="dayTotalAmount">0</span>€</span>
    </div>
  </div>

  <div id="syncStatus" class="sync-status small text-muted mb-3">
    <i class="bi bi-cloud"></i> <span>Inicializando…</span>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ====================== CONFIG ====================== */
const API_TOKEN = "740ed5c2c08938d3ab8c020c82ba802c3332a0d6ae2f6287c2b17c63732b1f12";
const API_BASE  = "";

const COMMISSION_PER_SERVICE = 6;
const STORAGE_KEY = "taxifind_comisiones_v2";

const MONTH_NAMES = ["enero","febrero","marzo","abril","mayo","junio",
  "julio","agosto","septiembre","octubre","noviembre","diciembre"];
const DAY_NAMES = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];

/* Hotel catalog. Order doesn't matter — aliases are sorted by length so the
   longest match wins (e.g. "nua giralda" beats "giralda"). */
const HOTELS = [
  // --- Comisionables ---
  { id:"indias",       name:"Casa de Indias",          commission:true,
    aliases:["casa de indias","indias"] },
  { id:"letoh",        name:"Letoh Letoh",             commission:true,
    aliases:["letoh letoh","letoh","leto"] },
  { id:"cetina",       name:"Cetina",                  commission:true,
    aliases:["cetina"] },
  { id:"halo",         name:"Halo Boutique",           commission:true,
    aliases:["halo boutique","halo"] },
  { id:"giralda",      name:"Giralda Center",          commission:true,
    aliases:["giralda center","giralda"] },
  { id:"only",         name:"Only YOU",                commission:true,
    aliases:["only you","only"] },
  { id:"puerta",       name:"La Puerta de Palacio",    commission:true,
    aliases:["la puerta de palacio","puerta de palacio","puerta palacio","puerta palacios","palacio"] },
  { id:"cool",         name:"Cool Sevilla",            commission:true,
    aliases:["cool sevilla","cool"] },
  { id:"buhaira",      name:"Sevilla Center Buhaira",  commission:true,
    aliases:["sevilla center buhaira","buhaira","buahira"] },
  { id:"viapol",       name:"Occidental Viapol",       commission:true,
    aliases:["occidental viapol","viapol"] },
  { id:"cse",          name:"CSE",                     commission:true,
    aliases:["cse"] },
  { id:"kube",         name:"Kube",                    commission:true,
    aliases:["kube"] },
  { id:"room",         name:"Room",                    commission:true,
    aliases:["room salvador","room jovellanos","room","jovellanos","salvador"] },
  // --- No comisionables ---
  { id:"casa1800",     name:"Casa 1800",               commission:false,
    aliases:["casa 1800","1800"] },
  { id:"unuk",         name:"Unuk",                    commission:false,
    aliases:["unuk"] },
  { id:"abanico",      name:"Abanico",                 commission:false,
    aliases:["abanico"] },
  { id:"alfaro",       name:"Alfaro",                  commission:false,
    aliases:["alfaro"] },
  { id:"sangil",       name:"San Gil",                 commission:false,
    aliases:["san gil","sangil","gil"] },
  { id:"goto",         name:"Go To Seville",           commission:false,
    aliases:["go to seville","go to sevilla","goto seville","gotoseville","go to","goto"] },
  { id:"nua-giralda",  name:"NÜA Giralda",             commission:false,
    aliases:["nua giralda","abadia"] },
  { id:"nua-santiago", name:"NÜA Santiago 15",         commission:false,
    aliases:["nua santiago 15","nua santiago","santiago 15","santiago"] },
  { id:"nua-alameda",  name:"NÜA Alameda",             commission:false,
    aliases:["nua alameda","alameda"] },
  { id:"nua-santacruz",name:"NÜA Santacruz",           commission:false,
    aliases:["nua santacruz","nua santa cruz","santacruz","santa cruz","s cruz","sta cruz"] },
  { id:"murillo",      name:"Hotel Murillo",           commission:false,
    aliases:["suites murillo","s. murillo","s murillo","murillo reinoso","reinoso","suit","murillo"] },
  { id:"ribera",       name:"Ribera de Triana",        commission:false,
    aliases:["ribera de triana","ribera"] },
  { id:"alcantara",    name:"Alcántara",               commission:false,
    aliases:["alcantara"] },
  { id:"radisson",     name:"Radisson",                commission:false,
    aliases:["radisson","radison"] },
  { id:"hsevilla",     name:"Hotel Sevilla",           commission:false,
    aliases:["hotel sevilla","h sevilla","h. sevilla"] },
];

/* Lines that are pure comments (with or without time): ignored silently. */
const COMMENT_LINE_KEYWORDS = ["transfer","transfers"];

/* Tokens that are always comments when found alongside a hotel. */
const COMMENT_TOKEN_KEYWORDS = [
  "bicis","bici","arto","jerez","aeropuerto","santa justa","s justa","s. justa"
];

/* Keywords that force a line to NOT commission, even if the hotel normally does.
   Typically place names (estaciones/zonas) where el taxista no cobra comisión. */
const NO_COMMISSION_KEYWORDS = ["armas","justa","urbano"];
function hasNoCommissionKeyword(normText){
  for(const kw of NO_COMMISSION_KEYWORDS){
    const re = new RegExp('(^|[^a-z0-9])' + escapeRegex(kw) + '([^a-z0-9]|$)', 'i');
    if(re.test(normText)) return true;
  }
  return false;
}

/* Pre-computed: every (alias, hotel) pair sorted longest alias first. */
const HOTEL_ALIASES = (() => {
  const arr = [];
  HOTELS.forEach(h => h.aliases.forEach(a => arr.push({ alias: a, hotel: h })));
  arr.sort((a, b) => b.alias.length - a.alias.length);
  return arr;
})();

/* ====================== STATE ====================== */
let state = loadState();
let currentDate = isoDate(new Date());

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { days: {}, dirty: {}, scroll: {}, paid: {} };
    const s = JSON.parse(raw);
    if(!s.days) s.days = {};
    if(!s.dirty) s.dirty = {};
    if(!s.scroll) s.scroll = {};
    if(!s.paid) s.paid = {};
    return s;
  }catch(e){ return { days: {}, dirty: {}, scroll: {}, paid: {} }; }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

/* ====================== DATE HELPERS ====================== */
function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseISO(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function shiftDay(iso, delta){
  const d = parseISO(iso); d.setDate(d.getDate()+delta); return isoDate(d);
}
function formatDayTitle(iso){
  const d = parseISO(iso);
  return `${DAY_NAMES[d.getDay()]}, ${d.getDate()} de ${MONTH_NAMES[d.getMonth()]}`;
}
function monthKey(iso){ return iso.slice(0,7); }
function prevMonthKey(mk){
  const [y,m] = mk.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(mk){
  const [y,m] = mk.split('-').map(Number);
  return `${MONTH_NAMES[m-1]} ${y}`;
}

function ensureDay(iso){
  if(!state.days[iso]) state.days[iso] = { raw: "" };
  if(typeof state.days[iso].raw !== 'string') state.days[iso].raw = "";
  return state.days[iso];
}

/* ====================== PARSER ====================== */
function normalize(s){
  return String(s||"")
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .toLowerCase();
}
function stripOfficialPrefix(s){
  // Remove leading "H.", "A.", "h.", "a." (with optional space) tokens
  // commonly found in pasted official hotel names (e.g. "H. Letoh Letoh 401").
  return String(s||"").replace(/^\s*[hHaA]\.?\s+/, '').trim();
}
function escapeRegex(s){
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* Match hora at the start of a line. Accepts:
   3'30 / 3:30 / 3.30 / 3h30 / 03:30 / 3 30 */
/* Hora separators accepted: any non-alphanumeric char (covers : ' ` ´ . , - ;
   plus typographic variants U+2018 ‘, U+2019 ’, U+02BC ʼ, U+2032 ′, U+00B4 ´),
   plus the letter h/H as in "4h30". The negative lookahead guards against a
   third digit attaching (so "401" alone is not parsed as "4:01"). */
const HORA_REGEX = /^\s*(\d{1,2})(?:[^0-9A-Za-zÀ-ÿ]|[hH])+(\d{2})(?![0-9])/;

/* Keywords that, when they appear as the last word of a line, mark the service
   as "paid by the hotel owner" — line shown orange and excluded from totals. */
const OWNER_KEYWORDS = new Set(["papa","alvaro"]);
function endsWithOwnerKeyword(rawLine){
  const m = rawLine.match(/(\S+)\s*$/);
  if(!m) return false;
  const last = normalize(m[1]).replace(/[^a-z0-9]/g,'');
  return OWNER_KEYWORDS.has(last);
}
const NOTE_MARKER_REGEX = /[\u{1F6D1}\u{1F6A8}\u{26A0}\u{1F4CC}\u{1F4CD}❗‼\u{1F4E2}\u{1F535}\u{1F534}]/u;

function parseHoraFromStart(line){
  const m = line.match(HORA_REGEX);
  if(!m) return null;
  let h = parseInt(m[1], 10);
  let mn = parseInt(m[2], 10);
  if(isNaN(h) || isNaN(mn)) return null;
  if(h > 23 || mn > 59) return null;
  const formatted = `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  return { hora: formatted, length: m[0].length };
}

function findHotelInText(normText){
  for(const { alias, hotel } of HOTEL_ALIASES){
    const re = new RegExp('(^|[^a-z0-9])' + escapeRegex(alias) + '(?![a-z0-9])', 'i');
    const m = normText.match(re);
    if(m){
      const offset = m[0].startsWith(alias) ? 0 : 1;
      return { hotel, alias, index: m.index + offset, length: alias.length };
    }
  }
  return null;
}

function isHeaderLine(line){
  // Headers like "Sabado 09/05/26.-" — has a date pattern but no time
  if(/\d{1,2}\/\d{1,2}\/\d{2,4}/.test(line)) return true;
  if(HORA_REGEX.test(line)) return false;
  const norm = normalize(line);
  // Day-of-week headers
  const days = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
  if(days.some(d => norm.startsWith(d))) return true;
  // "1 mayo" / "2 de mayo" / "10 Mayo" / "Mayo"
  const months = '(?:enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)';
  if(new RegExp('^\\s*\\d{1,2}\\s+(?:de\\s+)?' + months + '\\b', 'i').test(norm)) return true;
  if(new RegExp('^\\s*' + months + '\\s*\\d{2,4}\\s*$', 'i').test(norm)) return true;
  // Single word "Debe" / "Debe:" — section header, but we still keep following
  // lines (user wants Debe items treated like normal services).
  if(/^debe\s*:?\s*$/i.test(norm)) return true;
  return false;
}

function parseLine(rawLine){
  const trimmed = rawLine.trim();
  if(!trimmed) return null;

  if(isHeaderLine(trimmed)) return null;

  let hora = '';
  let rest = trimmed;
  const horaMatch = parseHoraFromStart(trimmed);
  if(horaMatch){
    hora = horaMatch.hora;
    rest = trimmed.slice(horaMatch.length).trim();
  }

  // Drop "H." / "A." prefixes pasted from the source app.
  rest = stripOfficialPrefix(rest);

  const norm = normalize(rest);
  const hasNoteMarker = NOTE_MARKER_REGEX.test(trimmed);

  // Pure comment line (e.g. "Transfer") — ignored regardless of hora,
  // UNLESS it carries a note marker like 🛑 (then user wants to see it).
  const isPureComment = COMMENT_LINE_KEYWORDS.some(kw => {
    const re = new RegExp('^' + escapeRegex(kw) + '\\b', 'i');
    return re.test(norm.trim());
  }) && !findHotelInText(norm);
  if(isPureComment && !hasNoteMarker) return null;

  if(!hora && !rest) return null;

  const hotelMatch = findHotelInText(norm);

  // Notes: lines decorated with 🛑/⚠️/etc., OR lines with no hora and no hotel
  // (intra-day reminders like "CAJAS DEL AIRE", "recogida arriba Goya 45 €").
  // Shown as gray informational rows; do not count for commissions.
  if(hasNoteMarker || (!hora && !hotelMatch)){
    return {
      raw: rawLine, hora,
      hotel: null,
      habitacion: '',
      comentario: rest || trimmed,
      commissionable: false,
      recognized: false,
      isNote: true,
      multiplier: 1
    };
  }

  // Build the "remainder" after removing the hotel alias (using normalized text
  // positions to also drop the alias from the original `rest`).
  let remainderRaw = rest;
  if(hotelMatch){
    // map normalized index back to original. Since normalize preserves length
    // (NFD strips combining marks but we removed them, so length may shrink).
    // Safer: remove first occurrence of any alias-token sequence from the raw
    // rest by lowercasing+normalizing per token.
    const tokens = rest.split(/\s+/).filter(Boolean);
    const aliasTokens = hotelMatch.alias.split(/\s+/);
    const out = [];
    let consumed = 0;
    for(const t of tokens){
      const tn = normalize(t).replace(/[^a-z0-9]/g,'');
      const want = aliasTokens[consumed]
        ? aliasTokens[consumed].replace(/[^a-z0-9]/g,'')
        : null;
      if(want && tn === want){
        consumed++;
        continue;
      }
      // also accept if alias token is a substring (handles "h." prefixes etc.)
      if(want && want.length >= 3 && tn.includes(want)){
        consumed++;
        continue;
      }
      out.push(t);
    }
    remainderRaw = out.join(' ');
  }

  // Extract habitación = first remaining token containing a digit.
  let habitacion = '';
  let comentario = '';
  const remTokens = remainderRaw.split(/\s+/).filter(Boolean);

  // strip token-level comment keywords first (so they don't appear as comment noise twice)
  const cleaned = [];
  for(let i=0;i<remTokens.length;i++){
    const t = remTokens[i];
    const tn = normalize(t);
    let isCommentTok = false;
    for(const kw of COMMENT_TOKEN_KEYWORDS){
      const kwParts = kw.split(/\s+/);
      const slice = remTokens.slice(i, i+kwParts.length).map(x => normalize(x)).join(' ');
      if(slice === kw){
        isCommentTok = true;
        i += kwParts.length - 1;
        cleaned.push({ kind:'comment', value: remTokens.slice(i - kwParts.length + 1, i + 1).join(' ') });
        break;
      }
    }
    if(isCommentTok) continue;
    if(/\d/.test(t)) cleaned.push({ kind:'numeric', value: t });
    else cleaned.push({ kind:'word', value: t });
  }

  for(const c of cleaned){
    if(c.kind === 'numeric' && !habitacion){
      habitacion = c.value.replace(/[.,;]+$/,'');
    } else {
      comentario += (comentario ? ' ' : '') + c.value;
    }
  }
  comentario = comentario.replace(/[.,;]+$/,'').trim();

  // "N taxis" / "N taxif" multiplier — same hotel, N services charged.
  let multiplier = 1;
  const multM = norm.match(/(\d+)\s*tax[ií]?[sf]?\b/);
  if(multM){
    const n = parseInt(multM[1], 10);
    if(n >= 2 && n <= 9) multiplier = n;
  }

  // Owner pays the commission for the taxista directly: line excluded from
  // total and shown in orange. Only relevant for would-be commissionable lines.
  const paidByOwner = endsWithOwnerKeyword(rawLine);
  const blockedByKeyword = hasNoCommissionKeyword(norm);
  const wouldComm = !!(hotelMatch && hotelMatch.hotel.commission) && !blockedByKeyword;

  return {
    raw: rawLine,
    hora,
    hotel: hotelMatch ? hotelMatch.hotel : null,
    habitacion,
    comentario,
    commissionable: wouldComm && !paidByOwner,
    recognized: !!hotelMatch,
    paidByOwner,
    isNote: false,
    multiplier
  };
}

function parseDay(rawText){
  const lines = String(rawText || '').split(/\r?\n/);
  const parsed = [];
  let total = 0;
  const breakdown = {};
  let commCount = 0;
  for(let i = 0; i < lines.length; i++){
    const p = parseLine(lines[i]);
    if(!p) continue;
    p.lineIndex = i;
    parsed.push(p);
    if(p.commissionable && p.hotel){
      const n = p.multiplier || 1;
      total += COMMISSION_PER_SERVICE * n;
      commCount += n;
      const k = p.hotel.id;
      if(!breakdown[k]) breakdown[k] = { name: p.hotel.name, count:0, total:0 };
      breakdown[k].count += n;
      breakdown[k].total += COMMISSION_PER_SERVICE * n;
    }
  }
  return { lines: parsed, total, breakdown, commCount };
}

/* ====================== RENDER ====================== */
const $ = sel => document.querySelector(sel);
const dayText = $("#dayText");
const parsedList = $("#parsedList");
const parsedSummary = $("#parsedSummary");

function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* Stable signature for "paid" state: normalized trimmed raw line.
   If the line content changes the paid state effectively resets, which is the
   intended behavior (a different service can't inherit the paid mark). */
function paidSig(p){
  return normalize(String(p && p.raw || '').trim()).replace(/\s+/g,' ');
}
function isLinePaid(iso, p){
  return !!(state.paid && state.paid[iso] && state.paid[iso][paidSig(p)]);
}
function setLinePaid(iso, sig, value){
  state.paid = state.paid || {};
  if(value){
    if(!state.paid[iso]) state.paid[iso] = {};
    state.paid[iso][sig] = true;
  } else if(state.paid[iso]){
    delete state.paid[iso][sig];
    if(Object.keys(state.paid[iso]).length === 0) delete state.paid[iso];
  }
  saveState();
}

function renderParsed(){
  const day = ensureDay(currentDate);
  const { lines, total, commCount } = parseDay(day.raw);

  if(lines.length === 0){
    parsedList.innerHTML = `<div class="parsed-empty"><i class="bi bi-pencil-square"></i> Escribe o pega los servicios arriba para verlos aquí desglosados.</div>`;
    parsedSummary.style.display = 'none';
  } else {
    parsedSummary.style.display = '';
    parsedSummary.innerHTML = `
      <div class="count">${lines.length} servicio${lines.length===1?'':'s'} · <strong>${commCount}</strong> comisionable${commCount===1?'':'s'}</div>
      <div><strong style="color:var(--color-terciary);">${total}€</strong></div>
    `;
    parsedList.innerHTML = lines.map(p => renderLine(p)).join('');
  }

  $("#dayCommission").textContent = `${total}€ en comisiones`;
  $("#dayTotalAmount").textContent = total;
  renderMonthSummary();
}

function renderLine(p){
  const lineIdx = (typeof p.lineIndex === 'number') ? p.lineIndex : -1;
  // Note line: shown gray with the raw text as body, no hotel/habitación.
  if(p.isNote){
    return `
      <div class="parsed-line line-known" data-line-idx="${lineIdx}" data-flash="lh-known">
        <div class="parsed-time ${p.hora ? '' : 'muted'}">${p.hora || '·'}</div>
        <div class="parsed-body">
          <div class="parsed-hotel">
            <span style="font-weight:500;color:#475569;">${escapeHtml(p.comentario || p.raw)}</span>
            <span class="pill pill-nocomm">Nota</span>
          </div>
        </div>
      </div>
    `;
  }
  let cls = 'line-unknown', pillCls = 'pill-unknown', pillText = 'No reconocido';
  if(p.paidByOwner && p.recognized && p.hotel && p.hotel.commission){
    cls = 'line-owner'; pillCls = 'pill-owner';
    pillText = (p.multiplier || 1) > 1 ? `Paga él (x${p.multiplier})` : 'Paga él';
  } else if(p.recognized && p.commissionable){
    const n = p.multiplier || 1;
    cls = 'line-comm'; pillCls = 'pill-comm';
    pillText = n > 1 ? `+${COMMISSION_PER_SERVICE * n}€ (x${n})` : `+${COMMISSION_PER_SERVICE}€`;
  } else if(p.recognized){
    cls = 'line-known'; pillCls = 'pill-nocomm';
    pillText = (p.multiplier || 1) > 1 ? `No comisiona (x${p.multiplier})` : 'No comisiona';
  }
  const hotelName = p.hotel ? p.hotel.name : (p.raw.replace(/^[\s\d:'`´h.\-]+/, '').split(/\s+/).slice(0,3).join(' ') || '—');
  const meta = p.habitacion ? `Hab. <span class="room">${escapeHtml(p.habitacion)}</span>` : '';
  const com = p.comentario ? escapeHtml(p.comentario) : '';
  const flashTag = cls === 'line-comm'    ? 'lh-comm'
                 : cls === 'line-owner'   ? 'lh-owner'
                 : cls === 'line-unknown' ? 'lh-unknown'
                 : 'lh-known';

  let actions = '';
  let extraCls = '';
  if(cls === 'line-comm'){
    const sig = paidSig(p);
    const paid = isLinePaid(currentDate, p);
    if(paid){
      extraCls = ' line-comm-paid';
      actions = `<div class="parsed-actions">
        <span class="btn-pay-done">Pagado</span>
        <button type="button" class="btn-pay-undo" data-pay-undo="${escapeHtml(sig)}" aria-label="Revocar pago" title="Revocar pago">×</button>
      </div>`;
    } else {
      actions = `<div class="parsed-actions">
        <button type="button" class="btn-pay" data-pay="${escapeHtml(sig)}">Pagado</button>
      </div>`;
    }
  }

  return `
    <div class="parsed-line ${cls}${extraCls}" data-line-idx="${lineIdx}" data-flash="${flashTag}">
      <div class="parsed-time ${p.hora ? '' : 'muted'}">${p.hora || '--:--'}</div>
      <div class="parsed-body">
        <div class="parsed-hotel">
          <span>${escapeHtml(hotelName)}</span>
          <span class="pill ${pillCls}">${pillText}</span>
        </div>
        ${meta ? `<div class="parsed-meta">${meta}</div>` : ''}
        ${com ? `<div class="parsed-comment">${com}</div>` : ''}
      </div>
      ${actions}
    </div>
  `;
}

function autoGrowTextarea(){
  // Grow with content; the CSS min-height keeps the baseline when empty.
  dayText.style.height = 'auto';
  dayText.style.height = dayText.scrollHeight + 'px';
}

function renderDay(){
  const day = ensureDay(currentDate);
  $("#dayTitle").textContent = formatDayTitle(currentDate);
  if(dayText.value !== day.raw) dayText.value = day.raw;
  autoGrowTextarea();
  renderParsed();
}

function computeMonthBreakdown(mk){
  const breakdown = {};
  let total = 0;
  Object.keys(state.days).forEach(iso=>{
    if(monthKey(iso) !== mk) return;
    const { breakdown: bd, total: t } = parseDay(state.days[iso].raw || '');
    Object.entries(bd).forEach(([k, v]) => {
      if(!breakdown[k]) breakdown[k] = { name: v.name, count:0, total:0 };
      breakdown[k].count += v.count;
      breakdown[k].total += v.total;
    });
    total += t;
  });
  return { breakdown, total };
}

function monthHasData(mk){
  return Object.keys(state.days).some(iso =>
    monthKey(iso) === mk && (state.days[iso].raw || '').trim() !== ''
  );
}

function renderMonthSummary(){
  const mk = monthKey(currentDate);
  const { breakdown, total } = computeMonthBreakdown(mk);
  $("#monthTotal").textContent = total;
  $("#monthName").textContent = MONTH_NAMES[parseInt(mk.split('-')[1],10)-1].toUpperCase();

  const list = $("#breakdownList");
  const keys = Object.keys(breakdown).sort((a,b)=> breakdown[b].total - breakdown[a].total);
  if(keys.length === 0){
    list.innerHTML = `<li class="list-group-item text-muted">Sin servicios comisionables todavía.</li>`;
  } else {
    list.innerHTML = keys.map(k => `
      <li class="list-group-item d-flex align-items-center justify-content-between">
        <div>
          <div class="fw-semibold">${escapeHtml(breakdown[k].name)}</div>
          <div class="text-muted small">${breakdown[k].count} servicio${breakdown[k].count===1?'':'s'}</div>
        </div>
        <div class="fw-bold text-primary">${breakdown[k].total}€</div>
      </li>
    `).join('');
  }

  const delBtn = $("#deleteMonthBtn");
  if(delBtn){
    delBtn.dataset.month = mk;
    delBtn.disabled = !monthHasData(mk);
  }
}

/* ====================== AUTOCOMPLETE ====================== */
/* Suggestion list: only commissionable hotel display names (the names taxistas
   most often type as shorthand). We use the first alias as the canonical token
   to insert (lowercase, short — closest to taxista's habitual writing). */
const AC_SUGGESTIONS = HOTELS
  .filter(h => h.commission)
  .map(h => ({
    label: h.name,
    insert: h.name,
    aliases: h.aliases.map(a => normalize(a))
  }));

let acPopup = null;
let acItems = [];
let acActiveIdx = 0;
let acAnchor = null; // { wordStart, wordEnd, word }

function getCurrentWord(textarea){
  const pos = textarea.selectionEnd;
  if(pos !== textarea.selectionStart) return null;
  const value = textarea.value;
  // Find start of current "word" — back to whitespace, newline, or punctuation.
  let start = pos;
  while(start > 0 && /[A-Za-zÀ-ÿ0-9.\-]/.test(value[start - 1])) start--;
  // Don't trigger inside numeric tokens or after punctuation joining digits.
  const word = value.slice(start, pos);
  if(!word || word.length < 2) return null;
  if(/^\d/.test(word)) return null; // numeric token (room number etc.)
  return { start, end: pos, word };
}

function findAcMatches(prefix){
  const np = normalize(prefix);
  if(!np) return [];
  const matches = [];
  for(const s of AC_SUGGESTIONS){
    if(s.aliases.some(a => a.startsWith(np))){
      matches.push(s);
      if(matches.length >= 5) break;
    }
  }
  return matches;
}

function getCaretCoords(textarea){
  // Mirror-div technique: clone textarea styles into a hidden div, write the
  // text up to the caret, append a marker span, measure its bounding rect.
  const cs = getComputedStyle(textarea);
  const mirror = document.createElement('div');
  const props = [
    'boxSizing','width','height','overflowX','overflowY',
    'borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth',
    'paddingTop','paddingRight','paddingBottom','paddingLeft',
    'fontStyle','fontVariant','fontWeight','fontStretch','fontSize','fontSizeAdjust',
    'lineHeight','fontFamily','textAlign','textTransform','textIndent',
    'letterSpacing','wordSpacing','tabSize','MozTabSize'
  ];
  props.forEach(p => mirror.style[p] = cs[p]);
  mirror.style.position = 'absolute';
  mirror.style.visibility = 'hidden';
  mirror.style.whiteSpace = 'pre-wrap';
  mirror.style.wordWrap = 'break-word';
  const rect = textarea.getBoundingClientRect();
  mirror.style.top = (rect.top + window.scrollY) + 'px';
  mirror.style.left = (rect.left + window.scrollX) + 'px';

  mirror.textContent = textarea.value.substring(0, textarea.selectionEnd);
  const span = document.createElement('span');
  span.textContent = '​';
  mirror.appendChild(span);
  document.body.appendChild(mirror);
  const sr = span.getBoundingClientRect();
  const lineHeight = parseFloat(cs.lineHeight) || parseFloat(cs.fontSize)*1.4;
  mirror.remove();
  return {
    top: sr.top + window.scrollY - textarea.scrollTop,
    left: sr.left + window.scrollX - textarea.scrollLeft,
    height: lineHeight
  };
}

function closeAcPopup(){
  if(acPopup){ acPopup.remove(); acPopup = null; }
  acItems = []; acActiveIdx = 0; acAnchor = null;
  $("#acHint").classList.remove('is-visible');
}

function showAcPopup(matches, anchor){
  closeAcPopup();
  if(matches.length === 0) return;
  const coords = getCaretCoords(dayText);
  const popup = document.createElement('div');
  popup.className = 'ac-popup';
  matches.forEach((m, i)=>{
    const item = document.createElement('div');
    item.className = 'ac-item' + (i===0?' active':'');
    item.innerHTML = `<span>${escapeHtml(m.label)}</span><span class="ac-tag">+${COMMISSION_PER_SERVICE}€</span>`;
    item.addEventListener('mousedown', e=>{
      e.preventDefault();
      acActiveIdx = i;
      acceptAc();
    });
    popup.appendChild(item);
  });
  popup.style.top  = (coords.top + coords.height + 4) + 'px';
  popup.style.left = coords.left + 'px';
  document.body.appendChild(popup);
  acPopup = popup;
  acItems = matches;
  acActiveIdx = 0;
  acAnchor = anchor;
  $("#acHint").classList.add('is-visible');
}

function moveAc(dir){
  if(!acPopup || acItems.length === 0) return;
  acActiveIdx = (acActiveIdx + dir + acItems.length) % acItems.length;
  acPopup.querySelectorAll('.ac-item').forEach((el, i)=>{
    el.classList.toggle('active', i === acActiveIdx);
    if(i === acActiveIdx) el.scrollIntoView({block:'nearest'});
  });
}

function acceptAc(){
  if(!acPopup || acItems.length === 0 || !acAnchor) return false;
  const pick = acItems[acActiveIdx];
  const before = dayText.value.slice(0, acAnchor.start);
  const after  = dayText.value.slice(acAnchor.end);
  const inserted = pick.insert;
  dayText.value = before + inserted + after;
  const newPos = (before + inserted).length;
  dayText.setSelectionRange(newPos, newPos);
  closeAcPopup();
  // Trigger normal input flow so state/UI sync happens.
  dayText.dispatchEvent(new Event('input', { bubbles: true }));
  return true;
}

function maybeShowAc(){
  if(document.activeElement !== dayText) return;
  const anchor = getCurrentWord(dayText);
  if(!anchor){ closeAcPopup(); return; }
  const matches = findAcMatches(anchor.word);
  if(matches.length === 0){ closeAcPopup(); return; }
  // Don't suggest the exact same word the user already typed (already a hotel).
  const np = normalize(anchor.word);
  if(matches.some(m => m.aliases.some(a => a === np))){ closeAcPopup(); return; }
  showAcPopup(matches, anchor);
}

/* ====================== EVENTS ====================== */
let _renderTimer = null;
dayText.addEventListener('input', ()=>{
  const day = ensureDay(currentDate);
  day.raw = dayText.value;
  saveState();
  markDirty(currentDate);
  autoGrowTextarea();
  if(_renderTimer) clearTimeout(_renderTimer);
  _renderTimer = setTimeout(renderParsed, 80);
  maybeShowAc();
});

dayText.addEventListener('keydown', e=>{
  if(acPopup && acItems.length > 0){
    if(e.key === 'ArrowDown'){ e.preventDefault(); moveAc(1); return; }
    if(e.key === 'ArrowUp'){   e.preventDefault(); moveAc(-1); return; }
    if(e.key === 'Tab' || e.key === 'Enter'){
      if(acceptAc()){ e.preventDefault(); }
      return;
    }
    if(e.key === 'Escape'){ closeAcPopup(); return; }
  }
});

dayText.addEventListener('blur', ()=>{ setTimeout(closeAcPopup, 150); });
window.addEventListener('scroll', closeAcPopup, true);
window.addEventListener('resize', closeAcPopup);

/* Click on a parsed line → jump to that line in the textarea and flash it. */
function flashTextareaLine(lineIdx, flashTag){
  if(lineIdx < 0) return;
  const value = dayText.value;
  const lines = value.split('\n');
  if(lineIdx >= lines.length) return;

  // Place caret at the start of the target line (auto-scrolls inside textarea
  // if needed; on auto-grow textarea this typically doesn't trigger but the
  // caret position is useful as a visual anchor and for keyboard editing).
  const before = lines.slice(0, lineIdx).join('\n');
  const startPos = before.length + (lineIdx > 0 ? 1 : 0);
  const endPos   = startPos + (lines[lineIdx] || '').length;

  // Use a mirror div to find the pixel position of the line within the textarea.
  const cs = getComputedStyle(dayText);
  const mirror = document.createElement('div');
  const props = [
    'boxSizing','width','overflowX','overflowY',
    'borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth',
    'paddingTop','paddingRight','paddingBottom','paddingLeft',
    'fontStyle','fontVariant','fontWeight','fontStretch','fontSize','fontSizeAdjust',
    'lineHeight','fontFamily','textAlign','textTransform','textIndent',
    'letterSpacing','wordSpacing','tabSize','MozTabSize'
  ];
  props.forEach(p => mirror.style[p] = cs[p]);
  mirror.style.position = 'absolute';
  mirror.style.visibility = 'hidden';
  mirror.style.whiteSpace = 'pre-wrap';
  mirror.style.wordWrap = 'break-word';
  const taRect = dayText.getBoundingClientRect();
  mirror.style.top  = (taRect.top  + window.scrollY) + 'px';
  mirror.style.left = (taRect.left + window.scrollX) + 'px';

  mirror.textContent = before + (lineIdx > 0 ? '\n' : '');
  const startSpan = document.createElement('span');
  startSpan.textContent = '​';
  mirror.appendChild(startSpan);
  const lineSpan = document.createElement('span');
  lineSpan.textContent = (lines[lineIdx] || ' ');
  mirror.appendChild(lineSpan);

  document.body.appendChild(mirror);
  const startRect = startSpan.getBoundingClientRect();
  const lineRect  = lineSpan.getBoundingClientRect();
  mirror.remove();

  const lineHeight = parseFloat(cs.lineHeight) || (parseFloat(cs.fontSize) * 1.5);
  const padL = parseFloat(cs.paddingLeft);
  const padR = parseFloat(cs.paddingRight);
  const bordL = parseFloat(cs.borderLeftWidth);
  const bordR = parseFloat(cs.borderRightWidth);

  const overlay = document.createElement('div');
  overlay.className = 'line-highlight ' + (flashTag || 'lh-known');
  overlay.style.top    = (startRect.top + window.scrollY) + 'px';
  overlay.style.left   = (taRect.left + window.scrollX + bordL + padL - 2) + 'px';
  overlay.style.width  = (taRect.width - bordL - bordR - padL - padR + 4) + 'px';
  const height = Math.max(lineHeight, lineRect.bottom - startRect.top);
  overlay.style.height = height + 'px';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1900);

  // Smooth-scroll so the targeted line sits near the top of the viewport.
  const targetScrollY = startRect.top + window.scrollY - 90;
  window.scrollTo({ top: Math.max(0, targetScrollY), behavior: 'smooth' });

  // Focus + select the line so the keyboard cursor lands there too.
  dayText.focus({ preventScroll: true });
  dayText.setSelectionRange(startPos, endPos);
}

parsedList.addEventListener('click', e => {
  const payBtn = e.target.closest('[data-pay]');
  if(payBtn){
    e.stopPropagation();
    setLinePaid(currentDate, payBtn.getAttribute('data-pay'), true);
    renderParsed();
    return;
  }
  const undoBtn = e.target.closest('[data-pay-undo]');
  if(undoBtn){
    e.stopPropagation();
    setLinePaid(currentDate, undoBtn.getAttribute('data-pay-undo'), false);
    renderParsed();
    return;
  }
  const row = e.target.closest('.parsed-line');
  if(!row) return;
  const idx = parseInt(row.dataset.lineIdx, 10);
  if(isNaN(idx) || idx < 0) return;
  flashTextareaLine(idx, row.dataset.flash || 'lh-known');
});


/* Scroll memory per day. Resumed sessions stay where the user left them,
   but switching day always starts at the top. */
let _scrollTimer = null;
window.addEventListener('scroll', () => {
  if(_scrollTimer) clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(() => {
    state.scroll = state.scroll || {};
    state.scroll[currentDate] = window.scrollY;
    saveState();
  }, 250);
}, { passive: true });

function restoreScrollForCurrentDay(){
  const y = state.scroll && state.scroll[currentDate];
  if(typeof y === 'number' && y > 0){
    requestAnimationFrame(() => window.scrollTo(0, y));
  }
}

function navigateToDay(iso){
  currentDate = iso;
  state.scroll = state.scroll || {};
  state.scroll[currentDate] = 0;
  saveState();
  renderDay();
  window.scrollTo(0, 0);
}

$("#prevDayBtn").addEventListener('click', ()=>{ navigateToDay(shiftDay(currentDate,-1)); });
$("#nextDayBtn").addEventListener('click', ()=>{ navigateToDay(shiftDay(currentDate, 1)); });
$("#todayBtn").addEventListener('click',   ()=>{ navigateToDay(isoDate(new Date())); });

document.addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if(e.key === 'ArrowRight'){ navigateToDay(shiftDay(currentDate, 1)); }
  if(e.key === 'ArrowLeft'){  navigateToDay(shiftDay(currentDate,-1)); }
});

/* Re-apply scroll when iOS Safari restores the page after backgrounding. */
document.addEventListener('visibilitychange', () => {
  if(!document.hidden) restoreScrollForCurrentDay();
});
window.addEventListener('pageshow', () => restoreScrollForCurrentDay());

function computeDayTotal(iso){
  const d = state.days[iso];
  if(!d || !d.raw) return { total:0, count:0 };
  const { total, lines } = parseDay(d.raw);
  return { total, count: lines.length };
}

$("#deleteMonthBtn").addEventListener('click', async ()=>{
  const mk = $("#deleteMonthBtn").dataset.month || monthKey(currentDate);
  if(!monthHasData(mk)) return;
  if(!confirm(`¿ELIMINAR todos los datos de ${monthLabel(mk)}? Esta acción no se puede deshacer.`)) return;
  Object.keys(state.days).forEach(iso=>{
    if(monthKey(iso) === mk){
      delete state.days[iso];
      if(state.dirty) delete state.dirty[iso];
      if(state.paid) delete state.paid[iso];
    }
  });
  saveState();
  renderDay();
  try{
    setSyncStatus('syncing','Eliminando…');
    await apiFetch(`/api/services?month=${mk}`, { method:'DELETE' });
    setSyncStatus('synced');
  }catch(e){
    console.warn('Delete on server failed:', e);
    setSyncStatus('error','No se pudo eliminar en el servidor');
  }
});

/* Auto-refresh at 23:59 boundary */
function scheduleMidnightRefresh(){
  const now = new Date();
  const next = new Date(now);
  next.setHours(23,59,5,0);
  if(next <= now) next.setDate(next.getDate()+1);
  const ms = next - now;
  setTimeout(()=>{
    renderDay();
    scheduleMidnightRefresh();
  }, ms);
}

/* ====================== API SYNC ====================== */
function setSyncStatus(s, msg){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  const map = {
    syncing: { icon:'arrow-repeat', text: msg || 'Sincronizando…', cls:'is-syncing' },
    synced:  { icon:'cloud-check',  text: msg || 'Sincronizado',   cls:'is-synced'  },
    offline: { icon:'cloud-slash',  text: msg || 'Sin conexión',   cls:'is-offline' },
    error:   { icon:'exclamation-triangle', text: msg || 'Error de sync', cls:'is-error' }
  };
  const m = map[s] || map.offline;
  el.innerHTML = `<i class="bi bi-${m.icon}"></i> <span>${m.text}</span>`;
  el.className = `sync-status small ${m.cls}`;
}

async function apiFetch(path, opts={}){
  const headers = Object.assign(
    { 'X-API-Token': API_TOKEN },
    opts.body ? { 'Content-Type': 'application/json' } : {},
    opts.headers || {}
  );
  const r = await fetch(API_BASE + path, Object.assign({}, opts, { headers }));
  if(!r.ok){
    const text = await r.text().catch(()=>r.statusText);
    throw new Error(`${r.status}: ${text}`);
  }
  return r.json();
}

function markDirty(iso){
  if(!iso) iso = currentDate;
  state.dirty = state.dirty || {};
  state.dirty[iso] = true;
  saveState();
  scheduleSync();
}

let _syncTimer = null;
function scheduleSync(delay = 1500){
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncDirty, delay);
}

let _isSyncing = false;
async function syncDirty(){
  if(_isSyncing) return;
  if(!navigator.onLine){ setSyncStatus('offline'); return; }
  const dirty = Object.keys(state.dirty || {});
  if(dirty.length === 0){ setSyncStatus('synced'); return; }
  _isSyncing = true;
  setSyncStatus('syncing');
  try{
    for(const iso of dirty){
      const day = state.days[iso];
      const raw = (day && day.raw) || '';
      try{
        await apiFetch('/api/services', {
          method: 'PUT',
          body: JSON.stringify({ date: iso, raw })
        });
        delete state.dirty[iso];
        saveState();
      }catch(e){
        console.warn('Sync push failed for', iso, e);
        setSyncStatus('error', 'Error de sync');
        return;
      }
    }
    setSyncStatus('synced');
  } finally {
    _isSyncing = false;
  }
}

async function pullFromServer(){
  if(!navigator.onLine){ setSyncStatus('offline'); return; }
  try{
    setSyncStatus('syncing', 'Cargando…');
    const today = new Date();
    // Pull a wide historical window so navegar a meses antiguos en otro
    // dispositivo siempre muestra los datos. El volumen es minúsculo
    // (≤ 1 fila/día) — no merece la pena paginar.
    const from = '2020-01-01';
    const toDate = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    const to = isoDate(toDate);
    const data = await apiFetch(`/api/services?from=${from}&to=${to}`);
    const dirty = state.dirty || {};
    const serverDays = data.days || {};
    Object.keys(state.days).forEach(iso => {
      if(iso < from || iso > to) return;
      if(dirty[iso]) return;
      if(!serverDays[iso]) delete state.days[iso];
    });
    Object.entries(serverDays).forEach(([iso, payload])=>{
      if(dirty[iso]) return;
      state.days[iso] = { raw: (payload && payload.raw) || '' };
    });
    saveState();
    renderDay();
    setSyncStatus('synced');
    if(Object.keys(state.dirty || {}).length > 0) scheduleSync(200);
  }catch(e){
    console.warn('Pull failed:', e);
    setSyncStatus('offline');
  }
}

window.addEventListener('online',  ()=>{ pullFromServer(); });
window.addEventListener('offline', ()=>{ setSyncStatus('offline'); });
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden){ syncDirty(); }
});

/* ====================== INIT ====================== */
try{
  ensureDay(currentDate);
  renderDay();
  // Restore scroll right away based on localStorage (in case the server pull
  // takes a moment; we'll re-apply once the pull finishes to be safe).
  restoreScrollForCurrentDay();
  scheduleMidnightRefresh();
  pullFromServer().then(() => {
    // After server data merges in, the textarea height may have grown — apply
    // saved scroll again so the user lands where they left off.
    restoreScrollForCurrentDay();
  });
}catch(err){
  console.error('Init error:', err);
}
