<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#243D5D">
<title>Comisiones FindTaxi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Poppins:wght@400;500;700&display=swap">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  :root{
    --bs-primary: #243D5D;
    --bs-primary-rgb: 36,61,93;
    --color-terciary: #14b8a6;
    --bg-soft: #f5f7fb;
  }
  .text-primary{color: var(--bs-primary)!important;}
  .bg-primary{background-color: var(--bs-primary)!important;}
  .btn-primary{
    --bs-btn-bg: #243D5D; --bs-btn-border-color: #243D5D;
    --bs-btn-hover-bg: #1b2f49; --bs-btn-hover-border-color: #1b2f49;
    --bs-btn-active-bg: #15263a; --bs-btn-active-border-color: #15263a;
  }
  .btn-outline-primary{
    --bs-btn-color: #243D5D; --bs-btn-border-color: #243D5D;
    --bs-btn-hover-bg: #243D5D; --bs-btn-hover-border-color: #243D5D;
  }
  .form-control-cell:focus{background:#eaeef5;}
  html,body{height:100%;}
  body{
    font-family:'DM Sans', system-ui, sans-serif;
    background: var(--bg-soft);
    color:#1f2937;
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2,h3,h4,h5,h6,.brand-text{
    font-family:'Poppins', sans-serif;
    font-weight:700;
  }

  .bg-terciary{background-color: var(--color-terciary)!important; color:#fff!important;}
  .text-terciary{color: var(--color-terciary)!important;}

  /* MONTH SUMMARY HERO */
  .summary-card{
    position:relative;overflow:hidden;
    border:0; border-radius:20px;
    background:
      radial-gradient(120% 140% at 100% 0%, rgba(20,184,166,.35) 0%, rgba(20,184,166,0) 55%),
      radial-gradient(80% 120% at 0% 100%, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 60%),
      linear-gradient(135deg, #1a2e47 0%, #243D5D 45%, #34547d 100%);
    color:#fff;
    box-shadow:0 14px 36px rgba(36,61,93,.32);
    cursor:pointer;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .summary-card::before{
    content:""; position:absolute; right:-40px; top:-40px;
    width:160px; height:160px; border-radius:50%;
    background: radial-gradient(circle, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 70%);
    pointer-events:none;
  }
  .summary-card:hover{transform: translateY(-1px); box-shadow:0 16px 40px rgba(36,61,93,.36);}
  .summary-card .hero-row{
    display:flex;align-items:center;gap:.7rem;flex-wrap:nowrap;
  }
  .summary-card .hero-icon{
    width:38px;height:38px;border-radius:12px;flex:0 0 38px;
    background: rgba(255,255,255,.14);
    display:inline-flex;align-items:center;justify-content:center;
    backdrop-filter: blur(6px);
    font-size:1.1rem;
  }
  .summary-card .hero-text{
    font-family:'Poppins',sans-serif;font-weight:700;
    font-size:1.15rem;letter-spacing:-.01em;line-height:1.1;
    flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .summary-card .hero-text .hero-month{opacity:.8;font-weight:500;text-transform:uppercase;letter-spacing:.06em;font-size:.78rem;display:block;margin-bottom:.1rem;}
  .summary-card .hero-text .hero-amount{color:#fff;}
  .summary-card .hero-text .hero-amount .accent{color:#5eead4;}
  .summary-card .chev{
    width:32px;height:32px;border-radius:50%;
    background:rgba(255,255,255,.12);
    display:inline-flex;align-items:center;justify-content:center;
    transition:transform .2s ease;flex:0 0 32px;
  }
  .summary-card[aria-expanded="true"] .chev{transform:rotate(180deg);}
  @media (max-width: 380px){
    .summary-card .hero-text{font-size:1.02rem;}
    .summary-card .hero-icon{width:34px;height:34px;flex-basis:34px;}
  }

  .day-nav{
    background:#fff; border-radius:16px;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
  }
  .day-nav .day-title{font-weight:700;text-transform:capitalize;}
  .btn-day{
    width:42px;height:42px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    border:1px solid #e5e7eb;background:#fff;color:#243D5D;
  }
  .btn-day:hover{background:#eaeef5;}

  .table-services{
    background:#fff;border-radius:16px;overflow:hidden;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
  }
  .table-services thead th{
    font-size:.78rem; text-transform:uppercase; letter-spacing:.04em;
    color:#6b7280; background:#f8fafc; border-bottom:1px solid #eef2f7;
    font-weight:600;
  }
  .table-services td{vertical-align:middle; border-bottom:1px solid #f1f5f9;}
  .table-services tr:last-child td{border-bottom:0;}
  .form-control-cell{
    border:0; background:transparent; padding:.6rem .75rem;
    width:100%; font-size:1rem; outline:none;
  }
  .form-control-cell:focus{background:#eef4ff;}
  .row-commission{
    background: rgba(20,184,166,.08);
  }
  .badge-comm{
    background: var(--color-terciary); color:#fff;
    padding:.25rem .55rem;border-radius:999px;font-size:.72rem;font-weight:600;
  }

  .hint-list{
    position:absolute;z-index:50;background:#fff;border:1px solid #e5e7eb;
    border-radius:10px;box-shadow:0 12px 30px rgba(15,23,42,.12);
    max-height:220px;overflow:auto; min-width:160px;
  }
  .hint-list .hint{
    padding:.5rem .75rem;cursor:pointer;font-size:.95rem;
  }
  .hint-list .hint.active, .hint-list .hint:hover{background:#eaeef5;color:#243D5D;}

  .breakdown{
    background:#fff;border-radius:16px;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
  }
  .breakdown .list-group-item{border:0;border-bottom:1px solid #f1f5f9;}
  .breakdown .list-group-item:last-child{border-bottom:0;}

  .rounded-circle.shadow{box-shadow:0 6px 18px rgba(15,23,42,.12)!important;}

  .footer-actions .btn{border-radius:12px;font-weight:600;}
  .btn-primary{font-weight:600;}
  .btn-icon{
    width:42px;height:42px;border-radius:50%;flex:0 0 42px;
    display:inline-flex;align-items:center;justify-content:center;
    border:1px solid #e5e7eb;background:#fff;color:#243D5D;
    transition: background .15s ease;
  }
  .btn-icon:hover{background:#eaeef5;}
  .btn-add{flex:0 0 auto;}

  .day-total-pill{
    display:inline-flex;align-items:center;gap:.45rem;
    background:#fff;border:1px solid #e5e7eb;border-radius:999px;
    padding:.4rem .8rem;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
    flex:0 0 auto;
  }
  .day-total-pill .day-total-label{
    font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;font-weight:600;
  }
  .day-total-pill .day-total-amount{
    font-family:'Poppins',sans-serif;font-weight:700;color: var(--color-terciary);font-size:1.05rem;
  }
  @media (max-width: 380px){
    .btn-add{padding:.45rem .7rem;font-size:.92rem;}
    .day-total-pill{padding:.35rem .65rem;}
    .day-total-pill .day-total-label{font-size:.66rem;}
    .day-total-pill .day-total-amount{font-size:.95rem;}
  }

  @media (max-width: 575.98px){
    .summary-card .summary-amount{font-size:1.6rem;}
    .table-services td, .table-services th{padding:.45rem .35rem;}
    .form-control-cell{font-size:.95rem;padding:.5rem .4rem;}
    .day-nav .day-title{font-size:1rem;}
  }

  /* Hide spinner arrows on number inputs */
  input.no-spin::-webkit-outer-spin-button,
  input.no-spin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input.no-spin{-moz-appearance:textfield;}
</style>
</head>
<body>

<main class="container py-3" style="max-width:900px;">

  <!-- MONTH SUMMARY HERO -->
  <div class="summary-card px-3 py-3 mb-3" id="monthSummaryCard" role="button"
       data-bs-toggle="collapse" data-bs-target="#monthBreakdown" aria-expanded="false">
    <div class="hero-row">
      <span class="hero-icon"><i class="bi bi-coin"></i></span>
      <div class="hero-text">
        <span class="hero-month">Total mes</span>
        <span class="hero-amount"><span id="monthName">—</span> · <span class="accent"><span id="monthTotal">0</span>€</span></span>
      </div>
      <span class="chev"><i class="bi bi-chevron-down"></i></span>
    </div>
  </div>

  <div class="collapse mb-3" id="monthBreakdown">
    <div class="breakdown p-3 p-md-4">
      <h6 class="mb-3 text-muted text-uppercase" style="letter-spacing:.05em;">Desglose por hotel</h6>
      <ul class="list-group list-group-flush" id="breakdownList">
        <li class="list-group-item text-muted">Sin servicios comisionables todavía.</li>
      </ul>
      <div class="d-flex flex-wrap gap-2 mt-3">
        <button class="btn btn-outline-primary btn-sm" id="prevMonthBtn" style="display:none;">
          <i class="bi bi-clock-history"></i> Ver mes anterior
        </button>
      </div>
    </div>
  </div>

  <!-- DAY NAVIGATION -->
  <div class="day-nav d-flex align-items-center justify-content-between p-2 p-md-3 mb-3">
    <button class="btn-day" id="prevDayBtn" aria-label="Día anterior">
      <i class="bi bi-chevron-left"></i>
    </button>
    <div class="text-center">
      <div class="text-muted small">Jornada</div>
      <div class="day-title" id="dayTitle">—</div>
      <div class="text-terciary small" id="dayCommission">0€ en comisiones</div>
    </div>
    <button class="btn-day" id="nextDayBtn" aria-label="Día siguiente">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>

  <!-- SERVICES TABLE -->
  <div class="table-services mb-3">
    <div class="table-responsive">
      <table class="table mb-0 align-middle">
        <thead>
          <tr>
            <th style="width:90px;">Hora</th>
            <th>Hotel</th>
            <th>Hab.</th>
            <th>Taxista</th>
            <th style="width:60px;"></th>
          </tr>
        </thead>
        <tbody id="servicesBody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer-actions d-flex align-items-center flex-nowrap gap-2 mb-4">
    <button class="btn btn-primary btn-add" id="addRowBtn">
      <i class="bi bi-plus-lg"></i> <span class="d-none d-sm-inline">Añadir más</span><span class="d-inline d-sm-none">Añadir</span>
    </button>
    <button class="btn-icon" id="todayBtn" aria-label="Ir a hoy" title="Ir a hoy">
      <i class="bi bi-calendar-day"></i>
    </button>
    <div class="ms-auto day-total-pill">
      <span class="day-total-label">Total día</span>
      <span class="day-total-amount"><span id="dayTotalAmount">0</span>€</span>
    </div>
  </div>

  <!-- PREVIOUS MONTH MODAL -->
  <div class="modal fade" id="prevMonthModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content" style="border-radius:18px;border:0;">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-clock-history text-primary"></i> Mes anterior</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="prevMonthBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-danger" id="deletePrevMonthBtn">
            <i class="bi bi-trash3"></i> ELIMINAR
          </button>
        </div>
      </div>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ====================== CONFIG ====================== */
const COMMISSIONABLE_HOTELS = [
  "puerta palacios",
  "room salvador",
  "gotoseville",
  "buhaira",
  "cetina",
  "cool",
  "cse",
  "giralda",
  "halo",
  "indias",
  "kube",
  "leto",
  "only",
  "room",
  "viapol"
];
const COMMISSION_PER_SERVICE = 6;
const STORAGE_KEY = "taxifind_comisiones_v1";
const INITIAL_ROWS = 5;

const MONTH_NAMES = ["enero","febrero","marzo","abril","mayo","junio",
  "julio","agosto","septiembre","octubre","noviembre","diciembre"];
const DAY_NAMES = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];

/* ====================== STATE ====================== */
let state = loadState();
let currentDate = isoDate(new Date());

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { days: {} };
    const s = JSON.parse(raw);
    if(!s.days) s.days = {};
    return s;
  }catch(e){ return { days: {} }; }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

/* ====================== HELPERS ====================== */
function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseISO(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function shiftDay(iso, delta){
  const d = parseISO(iso); d.setDate(d.getDate()+delta); return isoDate(d);
}
function formatDayTitle(iso){
  const d = parseISO(iso);
  return `${DAY_NAMES[d.getDay()]}, ${d.getDate()} de ${MONTH_NAMES[d.getMonth()]}`;
}
function monthKey(iso){ return iso.slice(0,7); } // YYYY-MM
function prevMonthKey(mk){
  const [y,m] = mk.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(mk){
  const [y,m] = mk.split('-').map(Number);
  return `${MONTH_NAMES[m-1]} ${y}`;
}
function isCommissionableHotel(name){
  if(!name) return false;
  const n = name.trim().toLowerCase();
  if(!n) return false;
  return COMMISSIONABLE_HOTELS.some(h => n.includes(h));
}
function matchedHotelKey(name){
  const n = (name||"").trim().toLowerCase();
  return COMMISSIONABLE_HOTELS.find(h => n.includes(h)) || null;
}
function ensureDay(iso){
  if(!state.days[iso]) state.days[iso] = { rows: emptyRows(INITIAL_ROWS) };
  if(!Array.isArray(state.days[iso].rows)) state.days[iso].rows = [];
  while(state.days[iso].rows.length < INITIAL_ROWS){
    state.days[iso].rows.push({hora:"",hotel:"",habitacion:"",taxista:""});
  }
  return state.days[iso];
}
function emptyRows(n){
  return Array.from({length:n}, ()=>({hora:"",hotel:"",habitacion:"",taxista:""}));
}
function isRowEmpty(r){
  return !r.hora && !r.hotel && !r.habitacion && !r.taxista;
}

/* ====================== HORA FORMAT ====================== */
function formatHora(raw){
  if(!raw) return "";
  let s = String(raw).replace(/\D/g,'');
  if(!s) return "";
  if(s.length === 1) s = "0"+s+"00";
  else if(s.length === 2) s = s+"00";
  else if(s.length === 3) s = "0"+s;
  s = s.slice(0,4);
  let h = parseInt(s.slice(0,2),10);
  let m = parseInt(s.slice(2,4),10);
  if(isNaN(h)) h=0; if(isNaN(m)) m=0;
  if(h>23) h=23;
  if(m>59) m=59;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* ====================== RENDER ====================== */
const $ = sel => document.querySelector(sel);
const servicesBody = $("#servicesBody");

function render(){
  const day = ensureDay(currentDate);
  $("#dayTitle").textContent = formatDayTitle(currentDate);
  $("#todayBadge").textContent = formatDayTitle(isoDate(new Date()));

  // rows
  servicesBody.innerHTML = "";
  day.rows.forEach((r, idx)=>{
    const tr = document.createElement('tr');
    const isComm = isCommissionableHotel(r.hotel);
    if(isComm) tr.classList.add('row-commission');
    tr.innerHTML = `
      <td>
        <input class="form-control-cell text-center fw-semibold no-spin"
               data-field="hora" data-idx="${idx}" inputmode="numeric"
               placeholder="--:--" value="${escapeHtml(r.hora)}" maxlength="5">
      </td>
      <td style="position:relative;">
        <input class="form-control-cell"
               data-field="hotel" data-idx="${idx}" autocomplete="off"
               placeholder="Hotel" value="${escapeHtml(r.hotel)}">
      </td>
      <td>
        <input class="form-control-cell"
               data-field="habitacion" data-idx="${idx}"
               placeholder="Hab." value="${escapeHtml(r.habitacion)}">
      </td>
      <td>
        <input class="form-control-cell"
               data-field="taxista" data-idx="${idx}"
               placeholder="Taxista" value="${escapeHtml(r.taxista)}">
      </td>
      <td class="text-end pe-2">
        ${isComm ? `<span class="badge-comm">+${COMMISSION_PER_SERVICE}€</span>` : ''}
      </td>
    `;
    servicesBody.appendChild(tr);
  });

  // commission of the day
  const dayComm = computeDayCommission(currentDate);
  $("#dayCommission").textContent = `${dayComm}€ en comisiones`;
  $("#dayTotalAmount").textContent = dayComm;

  // month summary
  renderMonthSummary();
}

function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function computeDayCommission(iso){
  const d = state.days[iso];
  if(!d) return 0;
  return d.rows.reduce((acc,r)=> acc + (isCommissionableHotel(r.hotel) ? COMMISSION_PER_SERVICE : 0), 0);
}

function computeMonthBreakdown(mk){
  const breakdown = {}; // hotelKey -> { count, total }
  let total = 0;
  Object.keys(state.days).forEach(iso=>{
    if(monthKey(iso) !== mk) return;
    state.days[iso].rows.forEach(r=>{
      const key = matchedHotelKey(r.hotel);
      if(!key) return;
      if(!breakdown[key]) breakdown[key] = { count:0, total:0 };
      breakdown[key].count += 1;
      breakdown[key].total += COMMISSION_PER_SERVICE;
      total += COMMISSION_PER_SERVICE;
    });
  });
  return { breakdown, total };
}

function monthHasData(mk){
  return Object.keys(state.days).some(iso => monthKey(iso) === mk
    && state.days[iso].rows.some(r=>!isRowEmpty(r)));
}

function renderMonthSummary(){
  const mk = monthKey(currentDate);
  const { breakdown, total } = computeMonthBreakdown(mk);
  $("#monthTotal").textContent = total;
  $("#monthName").textContent = MONTH_NAMES[parseInt(mk.split('-')[1],10)-1].toUpperCase();

  const list = $("#breakdownList");
  const keys = Object.keys(breakdown).sort((a,b)=> breakdown[b].total - breakdown[a].total);
  if(keys.length === 0){
    list.innerHTML = `<li class="list-group-item text-muted">Sin servicios comisionables todavía.</li>`;
  } else {
    list.innerHTML = keys.map(k => `
      <li class="list-group-item d-flex align-items-center justify-content-between">
        <div>
          <div class="fw-semibold text-capitalize">${k}</div>
          <div class="text-muted small">${breakdown[k].count} servicio${breakdown[k].count===1?'':'s'}</div>
        </div>
        <div class="fw-bold text-primary">${breakdown[k].total}€</div>
      </li>
    `).join('');
  }

  // previous month button
  const pmk = prevMonthKey(mk);
  const btn = $("#prevMonthBtn");
  if(monthHasData(pmk)){
    btn.style.display = "inline-flex";
    btn.dataset.month = pmk;
  } else {
    btn.style.display = "none";
  }
}

/* ====================== AUTOCOMPLETE ====================== */
let activeHint = null;

function closeHints(){
  if(activeHint){ activeHint.remove(); activeHint = null; }
}

function showHotelHints(input){
  closeHints();
  const val = input.value.trim().toLowerCase();
  const matches = COMMISSIONABLE_HOTELS.filter(h =>
    !val || h.startsWith(val) || h.includes(val)
  );
  if(matches.length === 0) return;

  const list = document.createElement('div');
  list.className = 'hint-list';
  matches.forEach((h,i)=>{
    const item = document.createElement('div');
    item.className = 'hint' + (i===0?' active':'');
    item.textContent = h;
    item.addEventListener('mousedown', e=>{
      e.preventDefault();
      input.value = h;
      const idx = +input.dataset.idx;
      ensureDay(currentDate).rows[idx].hotel = h;
      saveState();
      closeHints();
      render();
      // re-focus next field (habitacion)
      const next = servicesBody.querySelector(`input[data-field="habitacion"][data-idx="${idx}"]`);
      if(next) next.focus();
    });
    list.appendChild(item);
  });

  const rect = input.getBoundingClientRect();
  list.style.left = (rect.left + window.scrollX) + 'px';
  list.style.top = (rect.bottom + window.scrollY + 2) + 'px';
  list.style.width = Math.max(rect.width, 160) + 'px';
  document.body.appendChild(list);
  activeHint = list;
}

function moveHint(dir){
  if(!activeHint) return;
  const items = [...activeHint.querySelectorAll('.hint')];
  if(items.length===0) return;
  let i = items.findIndex(el=>el.classList.contains('active'));
  items.forEach(el=>el.classList.remove('active'));
  i = (i + dir + items.length) % items.length;
  items[i].classList.add('active');
  items[i].scrollIntoView({block:'nearest'});
}

function pickActiveHint(input){
  if(!activeHint) return false;
  const active = activeHint.querySelector('.hint.active');
  if(!active) return false;
  const val = active.textContent;
  input.value = val;
  const idx = +input.dataset.idx;
  ensureDay(currentDate).rows[idx].hotel = val;
  saveState();
  closeHints();
  render();
  const next = servicesBody.querySelector(`input[data-field="habitacion"][data-idx="${idx}"]`);
  if(next) next.focus();
  return true;
}

/* ====================== EARLY RENDER ====================== */
// Render rows immediately so the user sees the table even if any later code
// (event listeners, bootstrap CDN, etc.) throws.
try{ ensureDay(currentDate); render(); }catch(e){ console.error('Early render error:', e); }

/* ====================== EVENTS ====================== */
servicesBody.addEventListener('input', e=>{
  const t = e.target;
  if(!t.matches('input[data-field]')) return;
  const idx = +t.dataset.idx;
  const field = t.dataset.field;
  const day = ensureDay(currentDate);
  day.rows[idx][field] = t.value;
  saveState();

  if(field === 'hotel'){
    showHotelHints(t);
    // light update of commission badge
    refreshCommissionUI();
  } else {
    // update day total only
    refreshCommissionUI();
  }
});

servicesBody.addEventListener('focusin', e=>{
  if(e.target.matches('input[data-field="hotel"]')){
    showHotelHints(e.target);
  }
});
servicesBody.addEventListener('focusout', e=>{
  if(e.target.matches('input[data-field="hotel"]')){
    setTimeout(()=>{ closeHints(); render(); }, 120);
  }
  if(e.target.matches('input[data-field="hora"]')){
    const formatted = formatHora(e.target.value);
    e.target.value = formatted;
    const idx = +e.target.dataset.idx;
    ensureDay(currentDate).rows[idx].hora = formatted;
    saveState();
  }
});

servicesBody.addEventListener('keydown', e=>{
  const t = e.target;
  if(!t.matches('input[data-field]')) return;
  const idx = +t.dataset.idx;
  const field = t.dataset.field;

  // Hotel autocomplete navigation
  if(field === 'hotel' && activeHint){
    if(e.key === 'ArrowDown'){ e.preventDefault(); moveHint(1); return; }
    if(e.key === 'ArrowUp'){ e.preventDefault(); moveHint(-1); return; }
    if(e.key === 'Enter' || e.key === 'Tab'){
      if(pickActiveHint(t)) e.preventDefault();
      return;
    }
    if(e.key === 'Escape'){ closeHints(); return; }
  }

  // Hora: auto-format and jump to Hotel
  if(field === 'hora'){
    const digits = t.value.replace(/\D/g,'');
    if((e.key === 'Enter' || e.key === 'Tab') ||
       (digits.length >= 4 && /\d/.test(e.key))){
      // Autoformat when 4 digits typed or on Enter/Tab
    }
    if(e.key === 'Enter'){
      e.preventDefault();
      const formatted = formatHora(t.value);
      t.value = formatted;
      ensureDay(currentDate).rows[idx].hora = formatted;
      saveState();
      const hotel = servicesBody.querySelector(`input[data-field="hotel"][data-idx="${idx}"]`);
      if(hotel) hotel.focus();
    }
  } else if(e.key === 'Enter'){
    e.preventDefault();
    const order = ['hora','hotel','habitacion','taxista'];
    const next = order[order.indexOf(field)+1];
    if(next){
      const el = servicesBody.querySelector(`input[data-field="${next}"][data-idx="${idx}"]`);
      if(el) el.focus();
    } else {
      // last column → next row first column, add row if needed
      const day = ensureDay(currentDate);
      if(idx === day.rows.length-1){ day.rows.push(emptyRows(1)[0]); saveState(); render(); }
      const el = servicesBody.querySelector(`input[data-field="hora"][data-idx="${idx+1}"]`);
      if(el) el.focus();
    }
  }
});

// Auto-format hora when user types 4 digits
servicesBody.addEventListener('input', e=>{
  const t = e.target;
  if(!t.matches('input[data-field="hora"]')) return;
  const digits = t.value.replace(/\D/g,'');
  if(digits.length === 4){
    const formatted = formatHora(t.value);
    t.value = formatted;
    const idx = +t.dataset.idx;
    ensureDay(currentDate).rows[idx].hora = formatted;
    saveState();
    const hotel = servicesBody.querySelector(`input[data-field="hotel"][data-idx="${idx}"]`);
    if(hotel) hotel.focus();
  }
});

function refreshCommissionUI(){
  // Recompute and update only badges + totals to avoid losing input focus
  const day = ensureDay(currentDate);
  const rows = servicesBody.querySelectorAll('tr');
  rows.forEach((tr, i)=>{
    const isComm = isCommissionableHotel(day.rows[i].hotel);
    const badgeCell = tr.lastElementChild;
    if(isComm){
      tr.classList.add('row-commission');
      badgeCell.innerHTML = `<span class="badge-comm">+${COMMISSION_PER_SERVICE}€</span>`;
    } else {
      tr.classList.remove('row-commission');
      badgeCell.innerHTML = '';
    }
  });
  const dayComm = computeDayCommission(currentDate);
  $("#dayCommission").textContent = `${dayComm}€ en comisiones`;
  $("#dayTotalAmount").textContent = dayComm;
  renderMonthSummary();
}

/* Day navigation */
$("#prevDayBtn").addEventListener('click', ()=>{ currentDate = shiftDay(currentDate,-1); render(); });
$("#nextDayBtn").addEventListener('click', ()=>{ currentDate = shiftDay(currentDate, 1); render(); });
$("#todayBtn").addEventListener('click', ()=>{ currentDate = isoDate(new Date()); render(); });

/* Keyboard arrows for day nav (when not focused on input) */
document.addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if(e.key === 'ArrowRight'){ currentDate = shiftDay(currentDate, 1); render(); }
  if(e.key === 'ArrowLeft'){ currentDate = shiftDay(currentDate,-1); render(); }
});

/* Add row */
$("#addRowBtn").addEventListener('click', ()=>{
  const day = ensureDay(currentDate);
  day.rows.push(emptyRows(1)[0]);
  saveState();
  render();
  // focus on new row
  const newIdx = day.rows.length-1;
  setTimeout(()=>{
    const el = servicesBody.querySelector(`input[data-field="hora"][data-idx="${newIdx}"]`);
    if(el) el.focus();
  }, 30);
});

/* Previous month */
let _prevMonthModal = null;
function getPrevMonthModal(){
  if(_prevMonthModal) return _prevMonthModal;
  if(typeof bootstrap === 'undefined' || !bootstrap.Modal) return null;
  _prevMonthModal = new bootstrap.Modal($("#prevMonthModal"));
  return _prevMonthModal;
}
$("#prevMonthBtn").addEventListener('click', ()=>{
  const pmk = $("#prevMonthBtn").dataset.month;
  if(!pmk) return;
  showPrevMonth(pmk);
});

function showPrevMonth(mk){
  const { breakdown, total } = computeMonthBreakdown(mk);
  const keys = Object.keys(breakdown).sort((a,b)=> breakdown[b].total - breakdown[a].total);
  const days = Object.keys(state.days)
    .filter(iso => monthKey(iso) === mk)
    .sort();

  let html = `
    <div class="text-center mb-3">
      <div class="text-muted small">${monthLabel(mk)}</div>
      <div class="display-6 text-primary fw-bold">${total}€</div>
      <div class="text-muted small">Total comisiones del mes</div>
    </div>
  `;
  if(keys.length){
    html += `<h6 class="text-uppercase text-muted small mt-3">Por hotel</h6>
      <ul class="list-group list-group-flush mb-3">`;
    keys.forEach(k=>{
      html += `
        <li class="list-group-item d-flex justify-content-between">
          <div><span class="fw-semibold text-capitalize">${k}</span>
          <span class="text-muted small ms-2">${breakdown[k].count} servicio${breakdown[k].count===1?'':'s'}</span></div>
          <div class="fw-bold text-primary">${breakdown[k].total}€</div>
        </li>`;
    });
    html += `</ul>`;
  }
  html += `<h6 class="text-uppercase text-muted small mt-3">Días con servicios</h6>
    <ul class="list-group list-group-flush">`;
  let any = false;
  days.forEach(iso=>{
    const c = computeDayCommission(iso);
    const services = state.days[iso].rows.filter(r=>!isRowEmpty(r)).length;
    if(services === 0 && c === 0) return;
    any = true;
    html += `<li class="list-group-item d-flex justify-content-between">
      <span>${formatDayTitle(iso)}</span>
      <span><span class="text-muted small me-2">${services} serv.</span><span class="fw-bold text-terciary">${c}€</span></span>
    </li>`;
  });
  if(!any) html += `<li class="list-group-item text-muted">Sin actividad registrada.</li>`;
  html += `</ul>`;

  $("#prevMonthBody").innerHTML = html;
  $("#deletePrevMonthBtn").dataset.month = mk;
  const m = getPrevMonthModal();
  if(m) m.show();
  else $("#prevMonthModal").style.display = "block"; // fallback minimal
}

$("#deletePrevMonthBtn").addEventListener('click', ()=>{
  const mk = $("#deletePrevMonthBtn").dataset.month;
  if(!mk) return;
  if(!confirm(`¿ELIMINAR todos los datos de ${monthLabel(mk)}? Esta acción no se puede deshacer.`)) return;
  Object.keys(state.days).forEach(iso=>{
    if(monthKey(iso) === mk) delete state.days[iso];
  });
  saveState();
  const m = getPrevMonthModal();
  if(m) m.hide();
  render();
});

/* Click outside to close hints */
document.addEventListener('mousedown', e=>{
  if(activeHint && !activeHint.contains(e.target) &&
     !e.target.matches('input[data-field="hotel"]')){
    closeHints();
  }
});

/* Auto-refresh at 23:59 boundary (in case the app stays open) */
function scheduleMidnightRefresh(){
  const now = new Date();
  const next = new Date(now);
  next.setHours(23,59,5,0);
  if(next <= now) next.setDate(next.getDate()+1);
  const ms = next - now;
  setTimeout(()=>{
    render();
    scheduleMidnightRefresh();
  }, ms);
}

/* INIT */
try{
  ensureDay(currentDate);
  render();
  scheduleMidnightRefresh();
}catch(err){
  console.error('Init error:', err);
  // último recurso: pintar al menos las 5 filas vacías
  try{
    const sb = document.getElementById('servicesBody');
    if(sb && !sb.children.length){
      sb.innerHTML = Array.from({length:5},(_,i)=>`
        <tr>
          <td><input class="form-control-cell text-center" placeholder="--:--"></td>
          <td><input class="form-control-cell" placeholder="Hotel"></td>
          <td><input class="form-control-cell" placeholder="Hab."></td>
          <td><input class="form-control-cell" placeholder="Taxista"></td>
          <td></td>
        </tr>`).join('');
    }
  }catch(_){}
}
</script>
