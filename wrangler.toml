name = "findtaxi"
compatibility_date = "2024-09-01"
pages_build_output_dir = "."

# Bind the D1 database. After running:
#   wrangler d1 create findtaxi-db
# paste the database_id below.
[[d1_databases]]
binding       = "DB"
database_name = "findtaxi-db"
database_id   = "e8eaff95-06e7-4256-baec-07d4d25ed1c9"

# API_TOKEN is set as a secret (NOT here):
#   wrangler pages secret put API_TOKEN --project-name findtaxi
